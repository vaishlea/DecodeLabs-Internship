<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriDosha Assessment</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- HEADER -->

    <header class="assessment-header">

        <div class="container">

            <h1>TriDosha Assessment</h1>

            <p>
                Answer each question honestly to discover your Ayurvedic
                constitution.
            </p>

        </div>

    </header>

    <!-- QUIZ SECTION -->

    <main class="container">

        <div class="quiz-wrapper">

            <!-- Progress -->

            <div class="progress-section">

                <div class="progress-info">

                    <span id="progress-text">
                        Question 1 of 15
                    </span>

                    <span id="progress-percent">
                        0%
                    </span>

                </div>

                <div class="progress-bar">

                    <div id="progress-fill"></div>

                </div>

            </div>

            <!-- Question Card -->

            <div class="question-card">

                <h2 id="question-text">
                    Loading Question...
                </h2>

                <div id="options-container" class="options-container">

                    <!-- JS Loads Options -->

                </div>

            </div>

            <!-- Navigation -->

            <div class="button-group">

                <button id="prev-btn" class="btn secondary-btn">
                    Previous
                </button>

                <button id="next-btn" class="btn">
                    Next
                </button>

                <button id="submit-btn" class="btn submit-btn">
                    Submit Assessment
                </button>

            </div>

        </div>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>
            © 2026 TriDosha Assessment | DecodeLabs Internship Project
        </p>

    </footer>

    <!-- JS FILES -->

    <script src="js/questions.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
