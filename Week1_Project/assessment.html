<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriDosha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="page-header">
        <h1>TriDosha Assessment</h1>
        <p>Answer honestly based on your natural tendencies.</p>
    </header>

    <main class="container">

        <section class="quiz-card">

            <div class="progress-container">
                <p id="progress-text">Question 1 of 15</p>
            </div>

            <h2 id="question-text">
                Loading Question...
            </h2>

            <div id="options-container" class="options-container">
                <!-- Options generated by JavaScript -->
            </div>

            <div class="button-group">
                <button id="prev-btn">Previous</button>
                <button id="next-btn">Next</button>
                <button id="submit-btn" style="display:none;">
                    Submit Assessment
                </button>
            </div>

        </section>

    </main>

    <script src="js/questions.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
